<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; margin: 14px; color: #222; }
      h1 { font-size: 18px; margin: 0; }
      h2 { font-size: 15px; margin: 18px 0 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
      .header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
      .readonly-badge { flex: 0 0 auto; background: #eaf3f8; color: #1f4e78; border: 1px solid #b7d7e8; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: bold; }
      .warning { background: #fff2cc; border-left: 4px solid #d97706; padding: 10px; margin: 12px 0; font-weight: bold; line-height: 1.5; }
      .ok { color: #0f766e; font-weight: bold; }
      .ng { color: #b91c1c; font-weight: bold; }
      .stack { display: grid; gap: 8px; }
      .card { border: 1px solid #ddd; border-radius: 8px; background: #fff; padding: 10px; overflow-wrap: anywhere; word-break: break-word; }
      .field { margin-bottom: 8px; }
      .field:last-child { margin-bottom: 0; }
      .label { color: #4b5563; font-size: 11px; font-weight: bold; margin-bottom: 2px; }
      .value { font-size: 13px; line-height: 1.45; white-space: pre-wrap; }
      .summary-card { background: #f9fafb; }
      .detail-card { padding: 0; }
      .detail-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: #f3f4f6; border-bottom: 1px solid #ddd; border-radius: 8px 8px 0 0; padding: 8px 10px; font-weight: bold; }
      .detail-title { overflow-wrap: anywhere; word-break: break-word; }
      .use-badge { flex: 0 0 auto; border-radius: 999px; padding: 2px 8px; font-size: 11px; background: #e5e7eb; color: #374151; }
      .detail-body { padding: 10px; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>勤務時間根拠確認</h1>
      <div class="readonly-badge" id="readOnlyMessage">表示専用</div>
    </div>
    <div id="mismatchWarning" class="warning" style="display:none;">
      明細側合計とデータ側合計が一致していません。<br>
      保存・計算実行を再実行してください。
    </div>

    <h2>案件情報</h2>
    <div id="caseInfo" class="stack"></div>

    <h2>勤務時間根拠サマリー</h2>
    <div id="summary" class="stack"></div>

    <h2>勤務時間根拠一覧</h2>
    <div id="details" class="stack"></div>

    <script>
      const payload = <?!= payloadJson ?>;
      const caseInfoFields = ['案件ID', 'サービスID', '年度', '契約先名', '現場名', '業務名', '現行単位', '計算結果状態', '確認状態', '文書転記OK', 'エラー内容'];
      const summaryFields = [
        ['明細件数', 'detailCount'],
        ['使用中明細件数', 'activeDetailCount'],
        ['不使用明細件数', 'inactiveDetailCount'],
        ['使用中 年間総労働時間 合計', 'activeAnnualWorkTimeTotal'],
        ['データ側 年間総労働時間_明細合計', 'dataAnnualWorkTimeTotal'],
        ['差額', 'difference'],
        ['判定', 'judgment'],
      ];
      const detailFields = ['区分', '年間休日', '勤務日数/年', '労働時間/日', '人員/日', '年間総労働時間', '根拠メモ', '備考'];

      function text(value) {
        if (value === null || typeof value === 'undefined') return '';
        if (Object.prototype.toString.call(value) === '[object Date]') return value.toLocaleString();
        return String(value);
      }

      function appendField(container, label, value, className) {
        const field = document.createElement('div');
        field.className = 'field';
        const labelElement = document.createElement('div');
        labelElement.className = 'label';
        labelElement.textContent = label;
        const valueElement = document.createElement('div');
        valueElement.className = 'value' + (className ? ' ' + className : '');
        valueElement.textContent = text(value);
        field.appendChild(labelElement);
        field.appendChild(valueElement);
        container.appendChild(field);
      }

      function renderFieldCard(containerId, pairs, source, cardClassName) {
        const container = document.getElementById(containerId);
        const card = document.createElement('div');
        card.className = 'card' + (cardClassName ? ' ' + cardClassName : '');
        pairs.forEach(function(pair) {
          appendField(card, pair[0], source[pair[1]], pair[1] === 'judgment' ? (source.isMatched ? 'ok' : 'ng') : '');
        });
        container.appendChild(card);
      }

      document.getElementById('readOnlyMessage').title = text(payload.readOnlyMessage);
      if (!payload.summary.isMatched) {
        document.getElementById('mismatchWarning').style.display = 'block';
      }
      renderFieldCard('caseInfo', caseInfoFields.map(function(field) { return [field, field]; }), payload.caseInfo);
      renderFieldCard('summary', summaryFields, payload.summary, 'summary-card');

      const detailsContainer = document.getElementById('details');
      payload.details.forEach(function(detail) {
        const card = document.createElement('div');
        card.className = 'card detail-card';
        const header = document.createElement('div');
        header.className = 'detail-header';
        const title = document.createElement('div');
        title.className = 'detail-title';
        title.textContent = '明細 ' + text(detail['明細行番号']);
        const useBadge = document.createElement('div');
        useBadge.className = 'use-badge';
        useBadge.textContent = text(detail['使用有無']);
        header.appendChild(title);
        header.appendChild(useBadge);
        const body = document.createElement('div');
        body.className = 'detail-body';
        detailFields.forEach(function(field) { appendField(body, field, detail[field]); });
        card.appendChild(header);
        card.appendChild(body);
        detailsContainer.appendChild(card);
      });
    </script>
  </body>
</html>
